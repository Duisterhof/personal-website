<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>scene/ — preview harness</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    html, body { margin: 0; height: 100%; background: #0b0b0f; color: #e5e7eb; font-family: ui-sans-serif, system-ui, sans-serif; }
    .hero { position: relative; overflow: hidden; min-height: 92vh; }
    #scene-root { position: absolute; inset: 0; z-index: 0; }
    .hero-content {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 92vh; pointer-events: none; text-align: center;
    }
    .hero-content h1 { font-size: clamp(48px, 7vw, 84px); margin: 0; font-weight: 700; letter-spacing: -0.02em; }
    .hero-content p { font-size: 18px; margin-top: 12px; opacity: 0.85; }
    .below { padding: 96px 16px; max-width: 720px; margin: 0 auto; }
    .below h2 { margin-top: 0; }
    .below p { line-height: 1.6; opacity: 0.85; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <section id="hero" class="hero">
    <div id="scene-root" aria-hidden="true"></div>
    <div class="hero-content">
      <h1>scene preview</h1>
      <p>scroll past the hero to verify the loop pauses</p>
    </div>
  </section>
  <main class="below">
    <h2>Below the fold</h2>
    <p>This stub page is just for the 3D worker to validate the scene renders
       and pauses correctly. Real integration is in <code>index.html</code>,
       owned by the layout builder.</p>
    <div style="height: 200vh;"></div>
  </main>
  <script type="module" src="./main.js"></script>
</body>
</html>
